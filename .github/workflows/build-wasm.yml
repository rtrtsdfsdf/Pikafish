name: Build Pikafish WASM

on:
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Build Pikafish WASM
        run: |
          cd src
          # 使用 emscripten 编译，指定 general-64 架构
          em++ -O3 -s WASM=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME='Pikafish' \
            -s EXIT_RUNTIME=1 \
            -s EXPORTED_FUNCTIONS='["_main","_uci"]' \
            -s EXTRA_EXPORTED_RUNTIME_METHODS='["ccall","cwrap"]' \
            -std=c++17 \
            -DNDEBUG \
            -DIS_64BIT \
            -DBITS=64 \
            -DUSE_POPCNT \
            -DUSE_NEON \
            $(find . -name '*.cpp' | grep -v 'syzygy') \
            -o ../dist/pikafish.js \
            -I. \
            -lpthread \
            --emrun

      - name: List output
        run: |
          ls -la dist/ || echo "No dist folder"
          find . -name "*.js" -o -name "*.wasm" 2>/dev/null | head -20

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: pikafish-wasm
          path: dist/
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: wasm-${{ github.run_number }}
          name: Pikafish WASM Build ${{ github.run_number }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
