name: Build Pikafish WASM

on:
  workflow_dispatch:  # 手动触发
  push:
    branches: [master]
    paths:
      - 'src/**'
      - '.github/workflows/build-wasm.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Verify Emscripten
        run: emcc -v

      - name: Build Pikafish WASM
        run: |
          cd src
          emmake make ARCH=wasm build=yes \
            COMP=emscripten \
            CXX=em++ \
            CFLAGS="-O3 -s WASM=1" \
            LDFLAGS="-s ALLOW_MEMORY_GROWTH=1 -s MODULARIZE=1 -s EXPORT_NAME='Pikafish' -s EXIT_RUNTIME=1"

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          cp src/pikafish.js dist/
          cp src/pikafish.wasm dist/ 2>/dev/null || echo "WASM file may have different name"
          ls -la src/*.js src/*.wasm 2>/dev/null || ls -la src/

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: pikafish-wasm
          path: dist/
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: wasm-${{ github.run_number }}
          name: Pikafish WASM Build ${{ github.run_number }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
