name: Build Pikafish WASM

on:
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Build Pikafish WASM
        run: |
          cd src
          make -j ARCH=wasm build

      - name: List output
        run: |
          ls -la src/*.js src/*.wasm 2>/dev/null || ls -la src/

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: pikafish-wasm
          path: |
            src/pikafish.js
            src/pikafish.wasm
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: wasm-${{ github.run_number }}
          name: Pikafish WASM Build ${{ github.run_number }}
          files: |
            src/pikafish.js
            src/pikafish.wasm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
